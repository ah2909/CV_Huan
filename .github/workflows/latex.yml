name: Build LaTeX PDF - Resume

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Resume (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          pre_compile: |
            tlmgr option repository https://mirrors.rit.edu/CTAN/systems/texlive/tlnet
            tlmgr update --self
            tlmgr install fontawesome5 fontspec lm babel-english

      - name: Extract job title
        id: jobtitle
        run: |
          TITLE=$(grep -oP '\\textit\{\\color\{primaryColor\}\K[^}]+' header.tex)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Rename Resume PDF
        run: cp main.pdf "CV Cao Anh Huan - ${{ steps.jobtitle.outputs.title }}.pdf"

      - name: List outputs
        run: ls -la *.pdf

      - name: Upload artifact (PDF)
        uses: actions/upload-artifact@v4
        with:
          name: CV Cao Anh Huan - ${{ steps.jobtitle.outputs.title }}
          path: CV Cao Anh Huan - ${{ steps.jobtitle.outputs.title }}.pdf

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            main.log
            main.aux

